<h1>Dr. APJ Abdul Kalam</h1>

<img src="https://cdn.britannica.com/56/148856-004-2F59E2D9/APJ-2008.jpg" width="200">

<p>
Dr. APJ Abdul Kalam was a famous Indian scientist and the 11th President of India. 
He was known as the "Missile Man of India". He was born on 15 October 1931 in Rameswaram, Tamil Nadu.
</p>

<h3>Achievements</h3>
<ul>
<li>Missile Man of India</li>
<li>11th President of India</li>
<li>Bharat Ratna Award</li>
</ul>
